<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>正在播放 - VideoHub</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ff4d4d'%3E%3Cpolygon points='23 7 16 12 23 17 23 7'/%3E%3Crect x='1' y='5' width='15' height='14' rx='2'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ========== Header ========== -->
  <header class="header">
    <a href="index.html" class="header-logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
        <polygon points="23 7 16 12 23 17 23 7"/>
        <rect x="1" y="5" width="15" height="14" rx="2"/>
      </svg>
      <span>VideoHub</span>
    </a>

    <div class="header-actions">
      <div class="header-search">
        <input type="text" id="search-input" placeholder="搜索视频、作者..." aria-label="搜索">
        <button id="search-btn" aria-label="搜索">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- ========== Main Content ========== -->
  <main class="main-content">
    <div class="player-container">

      <!-- Left: Player & Info -->
      <div class="player-main">
        <!-- Video Player -->
        <div class="player-wrapper">
          <video id="player" controls autoplay playsinline>
            <source src="" type="video/mp4">
            您的浏览器不支持视频播放
          </video>
        </div>

        <!-- Title -->
        <h1 class="player-title" id="player-title">加载中...</h1>

        <!-- Stats -->
        <div class="player-stats" id="player-stats"></div>

        <!-- Author & Description -->
        <div class="player-info">
          <img id="player-author-avatar" src="" alt="" class="player-info-avatar" onerror="this.style.display='none'">
          <div>
            <div class="player-info-name" id="player-author-name">-</div>
            <div class="player-info-desc" id="player-author-desc"></div>
          </div>
        </div>

        <!-- Comments -->
        <section class="comments-section">
          <h2 class="comments-title">评论 · <span id="comments-count">0</span></h2>
          <div id="comments-list"></div>
        </section>
      </div>

      <!-- Right: Related Videos -->
      <aside class="player-sidebar">
        <div class="sidebar-title">相关推荐</div>
        <div id="related-list">
          <div class="loading">
            <div class="spinner"></div>
            <p>加载推荐...</p>
          </div>
        </div>
      </aside>

    </div>
  </main>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
