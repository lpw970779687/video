<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>正在播放 - VideoHub</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ff4d4d'%3E%3Cpolygon points='23 7 16 12 23 17 23 7'/%3E%3Crect x='1' y='5' width='15' height='14' rx='2'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ========== Header ========== -->
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="header-logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="23 7 16 12 23 17 23 7"/>
          <rect x="1" y="5" width="15" height="14" rx="2"/>
        </svg>
        <span>VideoHub</span>
      </a>

      <div class="header-actions">
        <div class="header-search">
          <input type="text" id="search-input" placeholder="搜索剧集、作者..." aria-label="搜索">
          <button id="search-btn" aria-label="搜索">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- ========== Main Content ========== -->
  <main class="main-content">
    <div class="player-container">

      <!-- Left: Player & Info -->
      <div class="player-main">
        <!-- Video Player -->
        <div class="player-wrapper">
          <video id="player" controls autoplay playsinline>
            <source src="" type="video/mp4">
            您的浏览器不支持视频播放
          </video>
        </div>

        <!-- Episode Title -->
        <h1 class="player-title" id="player-title">加载中...</h1>

        <!-- Stats & Quality -->
        <div class="player-stats" id="player-stats"></div>

        <div class="quality-selector" id="quality-selector">
          <span class="quality-label">画质：</span>
          <div class="quality-options" id="quality-options"></div>
        </div>

        <!-- ===== Series Intro (专题栏) ===== -->
        <div class="series-intro" id="series-intro">
          <img class="series-intro-cover" id="series-cover" src="" alt="">
          <div class="series-intro-info">
            <div class="series-intro-header">
              <h2 class="series-intro-title" id="series-title"></h2>
              <span class="series-intro-badge" id="series-badge"></span>
            </div>
            <div class="series-intro-meta" id="series-meta"></div>
            <p class="series-intro-desc" id="series-desc"></p>
            <div class="series-intro-author" id="series-author-info">
              <img id="series-author-avatar" src="" alt="">
              <span id="series-author-name"></span>
            </div>
          </div>
        </div>

        <!-- ===== Episode List (选集) ===== -->
        <section class="episode-section">
          <h2 class="episode-section-title">选集</h2>
          <div class="episode-grid" id="episode-grid"></div>
        </section>

        </div>

    </div>
  </main>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
